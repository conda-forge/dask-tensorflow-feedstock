{% set version = "0.0.2" %}

package:
  name: dask-tensorflow
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/dask-tensorflow/dask-tensorflow-{{ version }}.tar.gz
  sha256: 9687ca632ca9769ccc2c8f99300ebfc675b19ef6369a57e33c00e7178f412d2e

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - dask
    - distributed
    - tensorflow

test:
  requires:
    - python {{ python_min }}
  imports:
    # Skip the import test on Linux as wheel file require a more recent
    # version of GLIBC++ than the VM used to build and test package.
    - dask_tensorflow  # [not linux]

about:
  home: The package home page
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Interactions between Dask and Tensorflow

extra:
  recipe-maintainers:
    - mrocklin
    - TomAugspurger
    - ocefpaf
